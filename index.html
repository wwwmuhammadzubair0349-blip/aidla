    <!--
      ============================================================
      PERFORMANCE FIX #1 — Google Fonts: Non-Blocking Load
      ============================================================
      PROBLEM:  Your original <link rel="stylesheet"> for Google
                Fonts blocks rendering — Lighthouse flagged this as
                "Render blocking requests: Est savings of 2,880ms"

      FIX:      3-step non-blocking font pattern:
                1. rel="preload" as="style"  → tells browser to
                   fetch the font CSS early but not block render
                2. media="print" onload="this.media='all'"  → CSS
                   loads as non-render-blocking, swaps to 'all'
                   once ready (fonts appear when downloaded)
                3. <noscript> fallback for JS-disabled browsers

                display=swap is kept — text shows immediately in
                system font, swaps to custom font on arrival.

      NOTE:     Kept only 2 preconnects (fonts.googleapis.com +
                fonts.gstatic.com). Lighthouse warned you had
                >4 preconnects which wastes connection slots.
                All 4 font families are in a single stylesheet
                request so no extra preconnects needed.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600;700;800&family=Syne:wght@400;600;700;800&family=Mulish:wght@300;400;500;600&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600;700;800&family=Syne:wght@400;600;700;800&family=Mulish:wght@300;400;500;600&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600;700;800&family=Syne:wght@400;600;700;800&family=Mulish:wght@300;400;500;600&display=swap"
      />
    </noscript>

  </head>

  <body>
    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>

    <!--
      ============================================================
      PERFORMANCE FIX #2 — Tool Scripts: defer (non-blocking)
      ============================================================
      PROBLEM:  mammoth, jspdf, html2canvas, html2pdf load
                synchronously and block the main thread. They are
                large libraries that contribute to:
                "Reduce unused JavaScript: Est savings of 395 KiB"

      FIX:      Added defer to every tool script.
                defer = browser downloads in parallel with HTML
                parsing, executes only after DOM is ready.
                Zero impact on page render or React startup.

      NEXT LEVEL (optional — biggest JS saving):
      Remove these global script tags entirely and use dynamic
      import() inside the component that actually needs them:

        const handleExport = async () => {
          const html2pdf = (await import('html2pdf.js')).default;
          // use html2pdf here
        };

      This loads 0 KB on page load and only fetches the library
      when the user actually clicks Export — saves ~300+ KiB
      from the initial bundle.
    -->
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  </body>
