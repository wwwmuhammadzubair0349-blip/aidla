<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Default Fallback Meta -->
    <title>AIDLA</title>
    <meta
      name="description"
      content="AIDLA offers free tools, courses, blogs, news, Islamic education, Arabic learning, and useful resources for students and learners."
    />
    <meta
      name="keywords"
      content="AIDLA, free tools, online courses, AI tools, Islamic education, Arabic learning, blogs, news, student platform"
    />
    <meta name="author" content="AIDLA Team" />
    <meta name="robots" content="index, follow" />

    <!-- Important:
         Do NOT keep a fixed canonical homepage URL here
         Do NOT keep a fixed og:url homepage URL here
         These must be set per page in React/Helmet
    -->

    <!-- Open Graph Fallback -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="AIDLA" />
    <meta property="og:title" content="AIDLA" />
    <meta
      property="og:description"
      content="Explore free tools, courses, blogs, resources, and educational content on AIDLA."
    />
    <meta property="og:image" content="https://www.aidla.online/og-home.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="AIDLA – Free Learning Platform" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Fallback -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@AIDLA" />
    <meta name="twitter:title" content="AIDLA" />
    <meta
      name="twitter:description"
      content="Explore free tools, courses, blogs, resources, and educational content on AIDLA."
    />
    <meta name="twitter:image" content="https://www.aidla.online/og-home.jpg" />
    <meta name="twitter:image:alt" content="AIDLA – Free Learning Platform" />

    <meta name="theme-color" content="#0b1437" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="AIDLA" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600;700;800&family=Syne:wght@400;600;700;800&family=Mulish:wght@300;400;500;600&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600;700;800&family=Syne:wght@400;600;700;800&family=Mulish:wght@300;400;500;600&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600;700;800&family=Syne:wght@400;600;700;800&family=Mulish:wght@300;400;500;600&display=swap"
      />
    </noscript>
    <script>
  const url = window.location.href;

  const meta = document.createElement("meta");
  meta.setAttribute("property", "og:url");
  meta.setAttribute("content", url);

  document.head.appendChild(meta);
</script>
<link rel="icon" type="image/x-icon" href="/favicon.ico" />
<link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
<link rel="manifest" href="/site.webmanifest" />
<meta name="theme-color" content="#1a3a8f" />
  </head>

  <body>
    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>

    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  </body>
</html>
